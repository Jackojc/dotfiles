# Potentially can fuck up tmux
# term=screen-256color

# app-id=terminal
# title=terminal

initial-window-size-chars=80x25

# font=APL386 Unicode:size=23
font=Intel One Mono:size=10
font-size-adjustment=1

box-drawings-uses-font-glyphs=no
dpi-aware=yes

pad=0x0 center
resize-by-cells=no
resize-delay-ms=0
bold-text-in-bright=no

word-delimiters=,│`|:"'()[]{}<>-_
selection-target=both

[url]
osc8-underline=always

[colors-dark]
alpha=0.9961

background=0e0f1a
foreground=f4f4f4

# Normal/regular colors (color palette 0-7)
regular0=000000  # black
regular1=d55c00  # red/vermillion
regular2=009e74  # green
regular3=f0e442  # yellow
regular4=0072b2  # blue
regular5=1f202a  # magenta/navy
regular6=56b3e9  # cyan
regular7=f4f4f4  # white

# Bright colors (color palette 8-15)
bright0=252525   # bright black
bright1=e3691d   # bright red/vermillion
bright2=23ab80   # bright green
bright3=fdf153   # bright yellow
bright4=1b7ebf   # bright blue
bright5=292a34   # bright magenta/navy
bright6=63c0f7   # bright cyan
bright7=ffffff   # bright white

urls=fdf153  # bright yellow

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down

clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=none

search-start=none

font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

spawn-terminal=none
show-urls-launch=Control+Shift+o
show-urls-copy=none

[mouse-bindings]
scrollback-up-mouse=BTN_WHEEL_BACK
scrollback-down-mouse=BTN_WHEEL_FORWARD

font-increase=none
font-decrease=none

selection-override-modifiers=Shift
primary-paste=BTN_MIDDLE
select-begin=BTN_LEFT
select-begin-block=Control+BTN_LEFT
select-extend=BTN_RIGHT
select-extend-character-wise=Control+BTN_RIGHT
select-word=BTN_LEFT-2
select-word-whitespace=Control+BTN_LEFT-2
